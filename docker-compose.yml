services:
  db:
    image: pgvector/pgvector:pg16
    container_name: maya-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maya
    ports:
      - "5432:5432"
    volumes:
      - maya_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maya"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  maya_pgdata:
